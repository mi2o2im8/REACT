<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arrow function</title>

    <script>
        // 함수를 정의하는 새로운 문법: 화살표 함수(Arraow Function)
        
        // 1.[기존방식] 선언적 함수
        function show(){
            document.write('show!!<br>');
        }
        show();

        //2.[기존방식] 익명 함수
        const output= function(){
            document.write('익명함수 output!!<br>');
        }
        output();

        // 3.[새로운 방식] 화살표함수 -  익명함수를 더 간결하게..
        let display= ()=>{
            document.write('display! <br>');
        }
        display();

        // 화살표함수(=>는 funtion 을 대체함)로 파라미터를 받을 수 있음.
        let display2= (name)=>{
            document.write('display2: '+ name + '<br>');
        }
        display2('sam');
        display2('robin');

        // 만약 화살표함수의 파라미터가 1개라면..()를 생략해도 됨.
        let display3= name=>{ //네임이 하나!!
            document.write('display3: ' + name + '<br>');
        }
        display3('hong');

        //만약. {}실행문 안에 1줄만 있다면.. {}도 생략가능
        let display4= name=> document.write('display4: ' + name + '<br>');
        display4('park');

        // 파라미터가 0개이거나. 2개 이상이면 ()생략 불가능.
        let display5= ()=> document.write('display5<br>');
        display5();

        const display6= (name, age) => document.write(name+','+age+'<br>')
        display6('kim', 35);





    </script>
</head>
<body>
    <hr>
    
    <!-- 화살표함수는 일반적으로 이벤트 처리용 콜백함수로 많이 사용됨 -->
    <button id="b1">button</button>
    <h3 id="hh"></h3>
    <script>
        // 버튼 클릭이벤트 처리하기
        // 1) 예전 방식
        const b1= document.getElementById('b1');
        b1.onclick= function(){
            document.getElementById('hh').innerHTML='click button!';
        }
        // 2) 화살표 함수로..
        b1.onclick= ()=>document.getElementById('hh').innerHTML='click button!';

        // 2. 반복문 처리할때도 화살표함수 활용
        let aaa= [10, 20, 30];
        //css선택자로 h3요소를 찾아서 값들을 출력해보기
        const h3= document.querySelector('#hh');

        h3.innerHTML=''
        //요소가 여러개 이니.. += 으로 누적하여 보여주기
        h3.innerHTML += aaa[0] + '<br>';
        h3.innerHTML += aaa[1] + '<br>';
        h3.innerHTML += aaa[2] + '<br>';
        h3.innerHTML += '<hr>';

        // 반복문으로 위 작업을 처리
        for(let i=0; i<aaa.length; i++){ //중간 i는 요소가 있는 갯수만큼
            h3.innerHTML += aaa[i] + '<br>';
        }
        h3.innerHTML += '<hr>';

        // 위 반복문은 실수의 여지가 존재함. -- 인덱스 번호를 알아서 0부터.. 요소개수만큼 반복
        for(let i in aaa){
            h3.innerHTML += aaa[i] + '<br>';
        }
        h3.innerHTML += '<hr>';

        // 이것도 짜증.. index 번호를 이용하기에.. 요소를 사용할때마다.. aaa[i] ..쓰기 짜증
        //배열객체가 본인 요소의 개수만큼 반복하는 기능을 가지고 있음.
        //.forEach()에 전달될 함수가 요소의 개수만큼 자동으로 실행됨.
        // aaa.forEach(function(value, index, array){ //요소값, 인덱스번호, 배열객체
        //     h3.innerHTML += value + '<br>';
        // });
        
        aaa.forEach(function(value){ //필요한 값만 써도 됨. 순서만 중요. 바로 위 방식과 똑같음
            h3.innerHTML += value + '<br>';
        });
        // .forEach()에 지정한 함수를 화살표 함수로 변겨앟면.. 더 간결해짐
        // aaa.forEach((value)=>{h3.innerHTML += value + '<br>'});
        aaa.forEach(value=>h3.innerHTML += value + '<br>'); // (), {} 생략가능
        // 여기까지 배움.......

        //이것도 짜증.. index 번호를 이용하기에..요소를 사용할때마다..aaa[i] ..쓰기 짜증
        //배열객체가 본인 요소의 개수만큼 반복하는 기능을 가지고 있음.
        //.forEach()에 전달될 함수가 요소의 개수만큼 자동으로 실행됨.
        // aaa.forEach( function(value,index,array){ //요소값,인덱스번호,배열객체
        //     h3.innerHTML += value +'<br>';
        // });
        aaa.forEach( function(value){ //필요한 값만 써도 됨. 순서만 중요
            h3.innerHTML += value +'<br>';
        });
        //.forEach()에 지정한 함수를 화살표 함수로 변경하면..더 간결해짐
        aaa.forEach(value=>h3.innerHTML += value +'<br>');

        // 각각의 요소에 접근하여 콜백함수의 내용을 수행하고 그 결과를 다시 새로운 배열로 리턴하는 map()
        //예) 배열의 각 요소를 제곱한 값들을 가진 새로운 배열 만들기
        let bbb= aaa.map(value=>value*value); //{}를 생략하려면..return 키워드와 ; 모두 제거
        document.write(bbb);//JS는 배열을 그대로 출력하면..요소값들을 , 구분으로 하여 출력해줌
        // 여기 까지는 복붙
        
    </script>
    
</body>
</html>
