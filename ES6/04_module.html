<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>es6 module</title>

    <!-- 모듈 : JS에서 다른 JS파일에 있는 함수/변수/클래스 등을 가져다 사용하는 기법 -->
    <!-- 모듈기능은 2가지 조건에서 구동됨 : 서버환경. module type임을 속성으로 명시 -->
    <!-- 리액트환경은 기본적으로 이 2가지 조건이 마련된 프로젝트 구조임. -->
    <script type="module">
        // 별도의 js에 있는 show 함수를 불러와서 사용해보기..
        //import show from './aa.js'; //export defaul 된 녀석만 import 가능

        // export default 가 아닌 녀석을 import 할때는 .. {}가 필요
        //import {output, name, age as a} from './aa.js';

        import show, {output, name, age as a} from './aa.js';
        
        
        //import한 함수를 호출해보기
        show();
        output();
        //document.write(name+", "+age +'<br>');
        alert(name+'\n'+a);
    </script>

    

</head>
<body>
    
</body>
</html>
